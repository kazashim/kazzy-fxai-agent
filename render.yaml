# render.yaml - Kazzy Agent Deployment Configuration
# Place this file in your project root for automatic deployment

services:
  # Backend Web Service
  - type: web
    name: kazzy-backend
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python api_server.py
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_API_SECRET
        sync: false
      - key: BYBIT_API_KEY
        sync: false
      - key: BYBIT_API_SECRET
        sync: false
      - key: COINBASE_API_KEY
        sync: false
      - key: COINBASE_API_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: POE_API_KEY
        sync: false

  # Frontend Static Site
  - type: web
    name: kazzy-agent
    plan: free
    rootDir: dist
    buildCommand: echo "Static site - no build required"
    staticPublishPath: .
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: kazzy-backend
          envVarKey: RENDER_EXTERNAL_URL
