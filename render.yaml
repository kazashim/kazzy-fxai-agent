# render.yaml - Kazzy Agent Deployment Configuration
# Deploys both frontend and backend as Web Services

services:
  # Backend Web Service (Python/FastAPI)
  - type: web
    name: kazzy-backend
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api_server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_API_SECRET
        sync: false
      - key: BYBIT_API_KEY
        sync: false
      - key: BYBIT_API_SECRET
        sync: false
      - key: COINBASE_API_KEY
        sync: false
      - key: COINBASE_API_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: POE_API_KEY
        sync: false

  # Frontend Web Service (Node.js/React)
  - type: web
    name: kazzy-frontend
    region: oregon
    plan: free
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npx serve dist -l $PORT
    envVars:
      - key: NODE_VERSION
        value: "18"
      - key: VITE_API_URL
        fromService:
          type: web
          name: kazzy-backend
          envVarKey: RENDER_EXTERNAL_URL
